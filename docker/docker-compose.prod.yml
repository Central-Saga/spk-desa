services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      - APP_NAME=SPK Desa
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-http://localhost}
      - LOG_CHANNEL=single
      - LOG_LEVEL=warning
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-spk_desa}
      - DB_USERNAME=${DB_USERNAME:-spk}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SESSION_DRIVER=redis
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=database
      - FILESYSTEM_DISK=local
      - MAIL_MAILER=smtp
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-noreply@spk-desa.baliprov.go.id}
      - MAIL_FROM_NAME=SPK Desa KI Bali
    networks:
      - spk
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE:-spk_desa}
      - MYSQL_USER=${DB_USERNAME:-spk}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - spk
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - spk
    deploy:
      replicas: 1

networks:
  spk:
    driver: overlay

volumes:
  mysql_data:
  redis_data:
